<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Producto - Sakura Kaigai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #2D3277; color: white; font-family: 'Poppins', sans-serif; }
        .navbar { background-color: rgba(45, 50, 119, 0.95) !important; }
        .btn-sakura { background-color: #F2A7B5; color: #2D3277; font-weight: bold; border-radius: 25px; padding: 10px 30px; border: none; }
        .btn-sakura:hover { background-color: white; transform: scale(1.05); transition: 0.3s; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top shadow-sm">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand text-decoration-none" href="index.html" style="color: #F2A7B5 !important;">
                <i class="fas fa-arrow-left"></i> Volver a la Tienda
            </a>
            <button class="btn btn-outline-light position-relative" type="button" data-bs-toggle="offcanvas" data-bs-target="#carritoOffcanvas">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </button>
        </div>
    </nav>

    <div class="container mt-5 mb-5" id="detalleProductoContainer">
        <div class="text-center mt-5"><i class="fas fa-spinner fa-spin fa-3x"></i><p>Cargando información...</p></div>
    </div>

    <div class="offcanvas offcanvas-end text-dark" tabindex="-1" id="carritoOffcanvas">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title text-primary fw-bold"><i class="fas fa-shopping-cart"></i> Tu Pedido</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <ul id="listaCarrito" class="list-group list-group-flush mb-3 flex-grow-1 overflow-auto"></ul>
            <div class="border-top pt-3">
                <h4 class="d-flex justify-content-between align-items-center mb-3">
                    <span>Total:</span><strong class="text-primary">$<span id="totalCarrito">0</span> MXN</strong>
                </h4>
                <a href="checkout.html" id="btnProcederPago" class="btn btn-sakura w-100">Ir a Pagar</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>

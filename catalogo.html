<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Completo - Sakura Kaigai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #2D3277; color: white; font-family: 'Poppins', sans-serif; }
        .navbar { background-color: rgba(45, 50, 119, 0.95) !important; }
        .btn-sakura { background-color: #F2A7B5; color: #2D3277; font-weight: bold; border-radius: 25px; transition: 0.3s; border: none;}
        .btn-sakura:hover { background-color: white; transform: scale(1.05); }
        .filtro-activo { background-color: #F2A7B5 !important; color: #2D3277 !important; border-color: #F2A7B5 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top shadow-sm">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand text-decoration-none" href="index.html" style="color: #F2A7B5 !important; font-weight: 600;">
                <i class="fas fa-torii-gate me-2"></i> Sakura Kaigai
            </a>
            <button class="btn btn-outline-light position-relative" type="button" data-bs-toggle="offcanvas" data-bs-target="#carritoOffcanvas">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </button>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <h1 class="text-center mb-4" style="color: #F2A7B5;">Catálogo Completo</h1>
        <p class="text-center mb-5">Filtra por tu categoría favorita y encuentra tu próximo tesoro japonés.</p>

        <div class="d-flex flex-wrap justify-content-center gap-2 mb-5" id="botonesFiltro">
            <button class="btn btn-outline-light filtro-activo btn-filtro" data-cat="Todos">Todos</button>
            <button class="btn btn-outline-light btn-filtro" data-cat="Figuras">Figuras</button>
            <button class="btn btn-outline-light btn-filtro" data-cat="Videojuegos">Videojuegos</button>
            <button class="btn btn-outline-light btn-filtro" data-cat="Juguetes">Juguetes</button>
            <button class="btn btn-outline-light btn-filtro" data-cat="Música">Música</button>
        </div>

        <div class="row" id="contenedorCatalogoFull">
            <div class="col-12 text-center">
                <div class="spinner-border text-light" role="status"></div>
                <p class="mt-2">Cargando inventario...</p>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end text-dark" tabindex="-1" id="carritoOffcanvas">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title text-primary fw-bold"><i class="fas fa-shopping-cart"></i> Tu Pedido</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <ul id="listaCarrito" class="list-group list-group-flush mb-3 flex-grow-1 overflow-auto"></ul>
            <div class="border-top pt-3">
                <h4 class="d-flex justify-content-between align-items-center mb-3">
                    <span>Total:</span><strong class="text-primary">$<span id="totalCarrito">0</span> MXN</strong>
                </h4>
                <a href="checkout.html" id="btnProcederPago" class="btn btn-sakura w-100 py-2 text-center text-decoration-none">Ir a Pagar</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>

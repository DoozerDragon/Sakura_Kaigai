<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Inventario Sakura Kaigai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .navbar-admin { background-color: #2D3277; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-admin shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-arrow-left"></i> Volver a la Tienda
            </a>
            <span class="navbar-text text-white fw-bold">
                Gestión de Inventario
            </span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-0 text-center">
                        <h3 class="text-primary"><i class="fas fa-box-open"></i> Agregar Nuevo Producto</h3>
                        <p class="text-muted">Añade artículos al catálogo de Sakura Kaigai</p>
                    </div>
                    <div class="card-body p-4">
                        
                        <form id="formAgregarProducto">
                            <div class="row">
                                <div class="col-md-8 mb-3">
                                    <label class="form-label fw-bold">Nombre del Producto</label>
                                    <input type="text" class="form-control" id="prodNombre" required placeholder="Ej: Figura Anya Forger">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">Precio (MXN)</label>
                                    <input type="number" class="form-control" id="prodPrecio" required placeholder="Ej: 950" min="1">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Categoría</label>
                                    <select class="form-select" id="prodCategoria">
                                        <option value="Figuras">Figuras Coleccionables</option>
                                        <option value="Videojuegos">Videojuegos / Retro</option>
                                        <option value="Juguetes">Juguetes (Beyblades, etc)</option>
                                        <option value="Música">Música y CDs</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-danger">Nombre de la Foto (Local)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-image text-muted"></i></span>
                                        <input type="text" class="form-control border-start-0" id="prodImagen" required placeholder="Ej: anya.jpg">
                                    </div>
                                    <small class="text-muted">Asegúrate de guardar la foto en tu carpeta <strong>/img</strong></small>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Descripción Completa</label>
                                <textarea class="form-control" id="prodDesc" rows="4" required placeholder="Describe los detalles, tamaño, marca del producto..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="background-color: #F2A7B5; border: none; color: #2D3277;">
                                Guardar Producto en Base de Datos <i class="fas fa-save ms-2"></i>
                            </button>
                        </form>

                    </div>
                </div>

                <div class="mt-5 mb-5" id="estadoCarga">
                    <h5 class="text-muted border-bottom pb-2">Productos Subidos Recientemente:</h5>
                    <ul class="list-group" id="listaRecientes">
                        </ul>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // Tu configuración
        const firebaseConfig = {
            apiKey: "AIzaSyC5DKxm0EiRVsUPJsUJPp6vjy_zSk0Nx_0",
            authDomain: "sakura-kaigai.firebaseapp.com",
            projectId: "sakura-kaigai",
            storageBucket: "sakura-kaigai.firebasestorage.app",
            messagingSenderId: "230688890947",
            appId: "1:230688890947:web:c1a7af95204e49c34174f6",
            measurementId: "G-ERFGDJFNW3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const formAgregar = document.getElementById('formAgregarProducto');
        const listaRecientes = document.getElementById('listaRecientes');

        formAgregar.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = formAgregar.querySelector('button[type="submit"]');
            const textoOriginal = btnSubmit.innerHTML;
            btnSubmit.innerHTML = 'Guardando... <i class="fas fa-spinner fa-spin ms-2"></i>';
            btnSubmit.disabled = true;

            const nuevoProducto = {
                nombre: document.getElementById('prodNombre').value,
                precio: parseFloat(document.getElementById('prodPrecio').value),
                categoria: document.getElementById('prodCategoria').value,
                imagen: document.getElementById('prodImagen').value,
                descripcion: document.getElementById('prodDesc').value,
                fechaCreacion: new Date()
            };

            try {
                // Guarda en la colección "productos"
                const docRef = await addDoc(collection(db, "productos"), nuevoProducto);
                
                alert("¡Producto guardado correctamente!");
                
                // Mostrarlo en la lista de abajo para confirmar
                listaRecientes.innerHTML += `<li class="list-group-item text-success"><i class="fas fa-check-circle"></i> ${nuevoProducto.nombre} ($${nuevoProducto.precio})</li>`;
                
                formAgregar.reset();
            } catch (error) {
                console.error("Error al guardar: ", error);
                alert("Error al intentar guardar el producto.");
            } finally {
                btnSubmit.innerHTML = textoOriginal;
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>

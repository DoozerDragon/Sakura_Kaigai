<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - Sakura Kaigai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .navbar { background-color: rgba(45, 50, 119, 0.95) !important; }
        .btn-sakura { background-color: #F2A7B5; color: #2D3277; font-weight: bold; padding: 12px; border: none; border-radius: 8px; transition: 0.3s; }
        .btn-sakura:hover { background-color: #2D3277; color: #F2A7B5; }
        .text-sakura-dark { color: #2D3277; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand text-decoration-none fw-bold" href="index.html" style="color: #F2A7B5 !important;">
                <i class="fas fa-arrow-left me-2"></i> Volver a la Tienda
            </a>
            <span class="text-white"><i class="fas fa-lock text-success"></i> Pago Seguro</span>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row">
            
            <div class="col-md-5 order-md-2 mb-4">
                <h4 class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-sakura-dark fw-bold">Resumen de tu pedido</span>
                    <span class="badge bg-danger rounded-pill" id="cartCount">0</span>
                </h4>
                
                <ul class="list-group mb-3 shadow-sm" id="listaCarrito">
                </ul>
                
                <div class="card shadow-sm border-0 border-top border-3 border-danger">
                    <div class="card-body d-flex justify-content-between">
                        <h5 class="mb-0 fw-bold">Total (MXN)</h5>
                        <h5 class="mb-0 fw-bold text-success">$<span id="totalCarrito">0</span></h5>
                    </div>
                </div>
            </div>

            <div class="col-md-7 order-md-1">
                <div class="card shadow border-0 rounded-4 p-4">
                    <h3 class="mb-4 text-sakura-dark fw-bold"><i class="fas fa-shipping-fast text-primary"></i> Finalizar Compra</h3>
                    
                    <form id="formPedido">
                        
                        <h5 class="mb-3 text-secondary border-bottom pb-2">1. Datos de Envío</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-12">
                                <label class="form-label fw-bold">Nombre Completo</label>
                                <input type="text" class="form-control" id="pedidoNombre" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Correo Electrónico</label>
                                <input type="email" class="form-control" id="pedidoEmail" placeholder="tu@correo.com" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Dirección de Envío</label>
                                <textarea class="form-control" id="pedidoDireccion" rows="2" placeholder="Calle, Número, Colonia, Ciudad, C.P." required></textarea>
                            </div>
                        </div>

                        <h5 class="mb-3 text-secondary border-bottom pb-2">2. Método de Pago</h5>
                        <div class="alert alert-warning py-2 mb-3" role="alert" style="font-size: 0.85rem;">
                            <i class="fas fa-info-circle"></i> <strong>Modo Demo:</strong> La conexión a pasarelas reales (Stripe/PayPal) está pendiente. Los datos de tarjeta no se validarán.
                        </div>
                        
                        <div class="row g-3 mb-4">
                            <div class="col-12">
                                <label class="form-label fw-bold">Nombre en la tarjeta</label>
                                <input type="text" class="form-control" placeholder="Ej. José María Estrada" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Número de tarjeta</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" placeholder="0000 0000 0000 0000" required>
                                    <span class="input-group-text"><i class="fab fa-cc-visa text-muted"></i></span>
                                    <span class="input-group-text"><i class="fab fa-cc-mastercard text-muted"></i></span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Vencimiento</label>
                                <input type="text" class="form-control" placeholder="MM/AA" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">CVV</label>
                                <input type="text" class="form-control" placeholder="123" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-sakura w-100 fs-5 mt-2">
                            <i class="fas fa-lock"></i> Pagar y Confirmar Pedido
                        </button>
                    </form>
                </div>
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
